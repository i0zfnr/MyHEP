<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline | StudentEdge</title>
    <meta name="theme-color" content="#171412">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Plus Jakarta Sans", "Inter", system-ui, sans-serif;
            color: #f7efe8;
            background:
                radial-gradient(circle at top left, rgba(215, 191, 168, .16), transparent 32%),
                linear-gradient(180deg, #1b1815 0%, #0f0e0d 100%);
        }
        .shell {
            width: min(560px, 100%);
            padding: 32px 28px;
            border-radius: 28px;
            border: 1px solid rgba(226, 209, 192, .14);
            background: rgba(24, 21, 18, .88);
            box-shadow: 0 28px 60px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.05);
            text-align: center;
        }
        img {
            width: 96px;
            height: 96px;
            object-fit: contain;
            margin-bottom: 16px;
            border-radius: 24px;
            background: rgba(255,255,255,.05);
            padding: 12px;
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            line-height: 1.05;
            letter-spacing: -.04em;
        }
        p {
            margin: 0;
            color: #c8b8a9;
            line-height: 1.7;
        }
        .action {
            display: inline-flex;
            margin-top: 22px;
            padding: 13px 18px;
            border-radius: 999px;
            text-decoration: none;
            color: #2a1d15;
            font-weight: 800;
            background: linear-gradient(135deg, #c9ae95 0%, #ecd7c3 100%);
            box-shadow: 0 12px 28px rgba(201, 174, 149, .22);
        }
    </style>
</head>
<body>
    <main class="shell">
        <img src="/images/pwa/icon-192.png" alt="StudentEdge">
        <h1>You're offline.</h1>
        <p>StudentEdge needs an internet connection for live records, scans, and account data. Reconnect and try again.</p>
        <a class="action" href="/">Try again</a>
    </main>
</body>
</html>
